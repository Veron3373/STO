<!DOCTYPE html>
<html lang="uk">

<head>
  <meta charset="UTF-8" />
  <title>Основний</title>
  <link rel="stylesheet" href="../src/scss/main.scss" />

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <!-- moment.js -->
  <script src="https://cdn.jsdelivr.net/momentjs/latest/moment.min.js"></script>
  <!-- Date Range Picker CSS + JS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.css" />
  <script src="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.min.js"></script>
</head>

<body class="page-2">

  <!-- Меню -->
  <ul class="main-menu">
    <li><a href="#" class="menu-link" onclick="window.location.href='/STO/'">Вихід</a></li>
    <li><a href="#" class="menu-link" data-action="openSettings">Налаштування</a></li>
    <li><a href="#" class="menu-link all_other_bases" data-action="openClient">Додати</a></li>
    <li class="active"><a href="#" class="menu-link" data-action="openHome">Наряд</a></li>
    <li>
      <!-- Поле дати -->
      <input type="text" id="dateRangePicker" readonly style="cursor: pointer; padding: 6px; border: 1px solid #ccc; border-radius: 4px;" />
    </li>
  </ul>

  <!-- Інші модальні вікна -->
  <a href="#" id="open-modal-sakaz_narad"></a>
  <a href="#" id="open-modal-create-sakaz_narad"></a>
  <a href="#" id="open-modal-all_other_bases"></a>
  <a href="#" id="open-modal-settings"></a>

  <!-- Таблиця -->
  <div id="table-container-modal-sakaz_narad"></div>

  <!-- Підключення скриптів -->
  <script>
    $(function () {
      $('#dateRangePicker').daterangepicker({
        locale: {
          format: 'DD.MM.YYYY',
          separator: ' - ',
          applyLabel: 'Прийняти',
          cancelLabel: 'Відмінити',
          fromLabel: 'Від',
          toLabel: 'До',
          customRangeLabel: 'Свій діапазон',
          weekLabel: 'Тиж',
          daysOfWeek: ['Нд', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'],
          monthNames: [
            'Січень', 'Лютий', 'Березень', 'Квітень', 'Травень', 'Червень',
            'Липень', 'Серпень', 'Вересень', 'Жовтень', 'Листопад', 'Грудень'
          ],
          firstDay: 1
        },
        opens: 'center',
        alwaysShowCalendars: true,
        autoUpdateInput: true,
        startDate: moment().subtract(29, 'days'),
        endDate: moment(),
        ranges: {
          'Сьогодні': [moment(), moment()],
          'Вчора': [moment().subtract(1, 'days'), moment().subtract(1, 'days')],
          'Останні 7 днів': [moment().subtract(6, 'days'), moment()],
          'Останні 30 днів': [moment().subtract(29, 'days'), moment()],
          'Поточний місяць': [moment().startOf('month'), moment().endOf('month')],
          'Минулий місяць': [
            moment().subtract(1, 'month').startOf('month'),
            moment().subtract(1, 'month').endOf('month')
          ]
        }
      });
    });
  </script>
</body>

</html>
