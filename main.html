<body class="page-2">

    <!-- Підключення зібраного TS -->
<script>
  $(document).ready(function () {
    $('#dateRangePicker').daterangepicker({
      timePicker: true,
      timePicker24Hour: true,
      startDate: moment().subtract(6, 'days'),
      endDate: moment(),
      locale: {
        format: 'DD/MM/YYYY HH:mm',
        applyLabel: 'Застосувати',
        cancelLabel: 'Скасувати',
        fromLabel: 'З',
        toLabel: 'По',
        customRangeLabel: 'Власний діапазон',
        daysOfWeek: ['Нд', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт','Сб'],
        monthNames: ['Січень', 'Лютий', 'Березень', 'Квітень', 'Травень', 'Червень',
          'Липень', 'Серпень', 'Вересень', 'Жовтень', 'Листопад', 'Грудень'],
        firstDay: 1
      }
    }, function (start, end, label) {
      console.log('Вибраний діапазон: ' + start.format('YYYY-MM-DD HH:mm') + ' по ' + end.format('YYYY-MM-DD HH:mm'));
      // за бажанням, запиши у інпут:
      $('#dateRangePicker').val(start.format('DD/MM/YYYY HH:mm') + ' - ' + end.format('DD/MM/YYYY HH:mm'));
    });
  });
</script>
